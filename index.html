<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <script type="module" src="script.js" defer></script>
  <script type="module" src="script2.js" defer></script>
  <title>Pokedex</title>
</head>

<body>
  <h1>Pokédex</h1>
  <form id="search-form" class="form">
    <input type="text" id="search-input" class="input" placeholder="Digite o nome ou o ID do Pokemon">
    <button class="btn" aria-label="Buscar">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
    </button>
  </form>

  <div class="main">
    <button class="btn-change" id="back"><img src="./arrow_back.svg" alt="back"></button>
    <div id="container"></div>
    <button class="btn-change" id="forward"><img src="./arrow_forward.svg" alt="forward"></button>
  </div>
  <div id="list"></div>
</body>

</html>
